<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4158D0;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#C850C0;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#FFCC70;stop-opacity:0.12"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4158D0;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#C850C0;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFCC70;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4158D0"/>
      <stop offset="50%" style="stop-color:#C850C0"/>
      <stop offset="100%" style="stop-color:#FFCC70"/>
    </linearGradient>
    <filter id="glassBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="20" y="10" width="760" height="140" rx="20" ry="20"
        fill="url(#glassGrad)" stroke="url(#borderGrad)" stroke-width="1.5"
        filter="url(#glassBlur)"/>
  <rect x="22" y="12" width="756" height="68" rx="18" ry="18"
        fill="white" opacity="0.04"/>
  <ellipse cx="120" cy="80" rx="45" ry="45" fill="#4158D0" opacity="0.06"/>
  <ellipse cx="680" cy="80" rx="55" ry="55" fill="#FFCC70" opacity="0.05"/>
  <ellipse cx="400" cy="130" rx="80" ry="30" fill="#C850C0" opacity="0.04"/>
  <text x="400" y="68" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    Ylsssq926
  </text>
  <text x="400" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="18" font-weight="400" fill="#9CA3AF" opacity="0.8">
    掠蓝
  </text>
  <text x="400" y="118" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="13" fill="#6B7280" opacity="0.9">
    AI Product Manager  ·  Independent Developer  ·  Wuhan
  </text>
  <circle cx="50" cy="30" r="3" fill="#4158D0" opacity="0.4"/>
  <circle cx="750" cy="30" r="2.5" fill="#FFCC70" opacity="0.4"/>
  <circle cx="750" cy="130" r="3" fill="#C850C0" opacity="0.3"/>
  <circle cx="50" cy="130" r="2" fill="#C850C0" opacity="0.3"/>
</svg>
